name: service_provider_app
description: Service Provider Management App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.4.9
  
  # Supabase
  supabase_flutter: ^2.3.4
  
  # Navigation
  go_router: ^13.0.0
  
  # UI
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7
  flutter_svg: ^2.0.9
  
  # Image Processing (REQUIRED for profile picture upload)
  image: ^4.1.7
  
  # Utilities
  intl: ^0.19.0
  uuid: ^4.3.3
  flutter_dotenv: ^5.1.0
  shared_preferences: ^2.2.2
  email_validator: ^2.1.17

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

  # For changing app launcher icon
  flutter_launcher_icons: ^0.13.1
  
  # For native splash screen
  flutter_native_splash: ^2.2.21

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/icons/

# Configuration for flutter_launcher_icons
flutter_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"

# Native splash screen configuration
flutter_native_splash:
  color: "#009688"  # Teal color
  
  image: assets/icons/app_icon.png
  
  android: true
  ios: true
  web: false
  
  # Android 12+ specific settings
  android_12:
    color: "#009688"  # Teal color for Android 12+
    image: assets/icons/app_icon.png
    icon_background_color: "#009688"
  
  android_gravity: center
  ios_content_mode: center
  fullscreen: true


